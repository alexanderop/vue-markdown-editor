  '@types/jsdom': ^28.0.1
  '@types/node': ^24.12.2
  '@vitejs/plugin-vue': ^6.0.6
  '@vitest/browser': ^4.1.5
  '@vitest/browser-playwright': ^4.1.5
  '@vue/test-utils': ^2.4.6
  '@vue/tsconfig': ^0.9.1
  axe-core: ^4.11.2
  class-variance-authority: ^0.7.1
