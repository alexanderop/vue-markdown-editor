pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: '*.{ts,tsx,vue,js,mjs,cjs}'
      run: pnpm exec oxlint {staged_files}

    - name: oxfmt
      glob: '*.{ts,tsx,vue,js,mjs,cjs,json,md,yml,yaml}'
      run: pnpm exec oxfmt --check {staged_files}

    - name: typecheck
      glob: '*.{ts,tsx,vue}'
      run: pnpm -r --parallel typecheck

commit-msg:
  jobs:
    - name: conventional-commit
      skip:
        - merge
        - rebase
      run: |
        head -n1 {1} | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?!?: .+' || {
          echo "✗ Commit message must follow Conventional Commits."
          echo "  Format: type(scope?): subject     (scope optional, ! for breaking)"
          echo "  Types : feat fix docs style refactor perf test build ci chore revert"
          echo "  Got   : $(head -n1 {1})"
          exit 1
        }
