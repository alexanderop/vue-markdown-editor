name: autofix.ci # needed to securely identify the workflow

on:
  pull_request:
  push:
    branches: [main]

# Read-only at the workflow level; autofix-ci uses its own short-lived token
# to push the diff, so we don't need contents:write here.
permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: ./.github/actions/setup
        with:
          node-version: '24'
          pnpm-version: '10.28.2'

      # The lint scripts run with --fix; format writes too. autofix-ci picks up
      # any resulting working-tree diff and commits it back to the PR branch.
      - run: pnpm -r lint
      - run: pnpm -r format

      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
